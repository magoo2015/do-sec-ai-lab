---
- name: Prepare AI node for SOC Assistant
  hosts: ai
  become: true

  tasks:
    - name: Install required packages
      ansible.builtin.apt:
        update_cache: yes
        name:
          - python3
          - python3-venv
          - python3-pip
          - git
          - curl
          - jq
          - build-essential
        state: present
